<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Live TV - پەخشی ڕاستەوخۆی کەناڵە کوردییەکان</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            color: #38bdf8;
        }

        .header p {
            margin: 0;
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Video Player Section */
        .player-section {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .current-channel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .live-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Channels List Section */
        .channels-section {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 520px;
        }

        .search-box {
            width: 100%;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 14px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box:focus {
            border-color: #38bdf8;
        }

        .channels-list-scroll {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: 400px;
            padding-left: 4px;
        }

        .channel-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 10px 14px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .channel-btn:hover {
            background: #374151;
            border-color: rgba(56, 189, 248, 0.3);
        }

        .channel-btn.active {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
        }

        .channel-btn.active .dot {
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>پەخشی ڕاستەوخۆی کەناڵە کوردییەکان</h1>
        <p>بە ئاسانی و بە کوالێتی بەرز سێری کەناڵە ئاسمانییەکان بکە</p>
    </header>

    <div class="main-container">
        <div class="player-section">
            <div class="video-wrapper">
                <iframe id="tvPlayer" src="" allowfullscreen></iframe>
            </div>
            <div class="current-channel-title">
                <span id="channelNameText">کەناڵێک هەڵبژێرە</span>
                <span class="live-badge">LIVE</span>
            </div>
        </div>

        <div class="channels-section">
            <input type="text" id="searchInput" class="search-box" placeholder="گەڕان بەدوای کەناڵدا..." onkeyup="filterChannels()">
            
            <div class="channels-list-scroll" id="channelsList">
                <div class="channel-btn" data-name="ڕووداو rudaw" onclick="playChannel('ڕووداو - Rudaw', 'https://www.youtube.com/embed/live_stream?channel=UC8K3V2c4m7Z6n1x8v9b0a1w', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>ڕووداو - Rudaw</span>
                    </div>
                </div>

                <div class="channel-btn" data-name="کوردستان ٢٤ kurdistan 24 k24" onclick="playChannel('کوردستان ٢٤ - K24', 'https://www.youtube.com/embed/live_stream?channel=UCXw84a9t4tN2u4v1x9v1b0w', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>کوردستان ٢٤ - K24</span>
                    </div>
                </div>

                <div class="channel-btn" data-name="ئێن ئاڕ تی nrt" onclick="playChannel('ئێن ئاڕ تی - NRT', 'https://www.youtube.com/embed/live_stream?channel=UCj8y4a9t4tN2u4v1x9v1b0w', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>ئێن ئاڕ تی - NRT</span>
                    </div>
                </div>

                <div class="channel-btn" data-name="کەناڵ ٤ channel 4" onclick="playChannel('کەناڵ ٤ - Channel 4', 'https://www.youtube.com/embed/live_stream?channel=UCo8y4a9t4tN2u4v1x9v1b0w', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>کەناڵ ٤ - Channel 4</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function playChannel(name, embedUrl, element) {
            document.getElementById('channelNameText').innerText = name;
            document.getElementById('tvPlayer').src = embedUrl;

            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function filterChannels() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let channels = document.querySelectorAll('.channel-btn');

            channels.forEach(channel => {
                let name = channel.getAttribute('data-name').toLowerCase();
                if (name.includes(input)) {
                    channel.style.display = 'flex';
                } else {
                    channel.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
