<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zora AI — Your Pocket AI Assistant</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .primary-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .brand-glow { box-shadow: 0 0 25px -5px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // زانیارییە سەرەکییەکانی سەپابەیس (ئێرە پڕ بکەرەوە یان لە ڕێگەی زانیاری خۆت دابنێ)
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [session, setSession] = useState(null);
            const [view, setView] = useState('landing'); // landing, auth, chat

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    if (session) setView('chat');
                });

                supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (session) setView('chat');
                });
            }, []);

            return (
                <div class="flex-1 flex flex-col">
                    {!session ? (
                        view === 'landing' ? (
                            <LandingView onGetStarted={() => setView('auth')} />
                        ) : (
                            <AuthView onBack={() => setView('landing')} />
                        )
                    ) : (
                        <ChatView session={session} onSignOut={() => supabase.auth.signOut()} />
                    )}
                </div>
            );
        }

        function LandingView({ onGetStarted }) {
            return (
                <main class="relative flex min-h-screen flex-col items-center justify-center px-6 text-center">
                    <div class="flex flex-col items-center gap-6 max-w-md w-full">
                        <div class="w-24 h-24 rounded-3xl primary-gradient flex items-center justify-center text-4xl font-bold brand-glow">Z</div>
                        <div class="space-y-3">
                            <h1 class="text-5xl font-black tracking-tight">Zora AI</h1>
                            <p class="text-lg text-slate-400 leading-relaxed">
                                Your personal AI assistant.<br/>Ask anything, get instant answers.
                            </p>
                        </div>
                        <div class="w-full space-y-3 pt-4">
                            <button onClick={onGetStarted} class="w-full h-14 rounded-2xl text-base font-semibold primary-gradient border-0 brand-glow transition hover:opacity-90">
                                Get Started Free
                            </button>
                        </div>
                    </div>
                </main>
            );
        }

        function AuthView({ onBack }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isSignup, setIsSignup] = useState(false);

            async function handleSubmit(e) {
                e.preventDefault();
                if (isSignup) {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) alert(error.message);
                    else alert("Check your email for confirmation!");
                } else {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) alert(error.message);
                }
            }

            return (
                <main class="flex min-h-screen flex-col items-center justify-center px-6 py-10">
                    <div class="w-full max-w-md flex flex-col items-center gap-6">
                        <button onClick={onBack} class="text-sm text-slate-400 hover:text-white">← Back to home</button>
                        <h1 class="text-3xl font-black">{isSignup ? "Create account" : "Welcome back"}</h1>
                        <form onSubmit={handleSubmit} class="w-full rounded-3xl border border-slate-800 bg-slate-900/50 p-6 space-y-4">
                            <div>
                                <label class="text-xs text-slate-400">Email</label>
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} class="w-full h-12 rounded-xl bg-slate-800 px-4 mt-1 border border-slate-700 outline-none focus:border-indigo-500" />
                            </div>
                            <div>
                                <label class="text-xs text-slate-400">Password</label>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} class="w-full h-12 rounded-xl bg-slate-800 px-4 mt-1 border border-slate-700 outline-none focus:border-indigo-500" />
                            </div>
                            <button type="submit" class="w-full h-12 rounded-xl font-semibold primary-gradient brand-glow">{isSignup ? "Sign Up" : "Log In"}</button>
                            <p class="text-center text-sm text-slate-400 pt-2">
                                <span onClick={() => setIsSignup(!isSignup)} class="text-indigo-400 cursor-pointer hover:underline">
                                    {isSignup ? "Already have an account? Log in" : "Don't have an account? Sign up"}
                                </span>
                            </p>
                        </form>
                    </div>
                </main>
            );
        }

        function ChatView({ session, onSignOut }) {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');

            async function handleSend(e) {
                e.preventDefault();
                if (!input.trim()) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                
                // لێرەدا دەتوانیت پەیوەندی بە ئای پی یان APIـی خۆتەوە بکەیت بۆ وەرگرتنی وەڵامی AI
                setTimeout(() => {
                    setMessages(prev => [...prev, { role: 'assistant', content: "سڵاو! من زۆرام، چۆن دەتوانم یارمەتیت بدەم؟" }]);
                }, 1000);
            }

            return (
                <div className="flex h-screen flex-col">
                    <header className="flex items-center justify-between border-b border-slate-800 bg-slate-900/60 px-6 py-4">
                        <span className="font-bold text-lg">Zora AI Chat</span>
                        <button onClick={onSignOut} class="text-sm text-red-400 hover:underline">Sign Out</button>
                    </header>
                    <div class="flex-1 overflow-y-auto p-4 space-y-4 max-w-3xl mx-auto w-full">
                        {messages.map((m, i) => (
                            <div key={i} class={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div class={`max-w-[80%] rounded-2xl px-4 py-3 text-sm ${m.role === 'user' ? 'primary-gradient text-white' : 'bg-slate-900 border border-slate-800'}`}>
                                    {m.content}
                                </div>
                            </div>
                        ))}
                    </div>
                    <form onSubmit={handleSend} class="border-t border-slate-800 p-4 bg-slate-900/60">
                        <div class="max-w-3xl mx-auto flex gap-2">
                            <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="Ask Zora anything..." class="flex-1 h-12 rounded-2xl bg-slate-800 px-4 border border-slate-700 outline-none focus:border-indigo-500" />
                            <button type="submit" class="h-12 px-6 rounded-2xl primary-gradient font-semibold">Send</button>
                        </div>
                    </form>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
