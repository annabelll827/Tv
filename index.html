<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەخشی ڕاستەوخۆ - مۆدێرن</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            font-size: 28px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        header p {
            font-size: 15px;
            color: #b0bec5;
            font-weight: 300;
        }

        .channel-selector {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 30px 20px 10px;
        }

        .channel-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .channel-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .channel-btn.active {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
            color: #000;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-container {
            width: 100%;
            max-width: 950px;
            background: #000000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            transform: scale(0.98);
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .video-container.active {
            display: block;
            opacity: 0;
        }

        .responsive-iframe {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
        }

        .responsive-iframe iframe, .responsive-iframe video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            object-fit: cover;
        }

        footer {
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #78909c;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <header>
        <h1>پەخشی ڕاستەوخۆی کەناڵەکان</h1>
        <p>بینەری باشترین کەناڵەکان بە ڕوونی بەرز بە</p>
    </header>

    <div class="channel-selector">
        <button class="channel-btn active" onclick="switchChannel('ava', 'https://kurditv.com/embed/1245/', 'iframe', this)">کەناڵی ئاڤا</button>
        <button class="channel-btn" onclick="switchChannel('rudaw', 'https://live.rudaw.net/hls/rudaw-tv/master.m3u8', 'hls', this)">ڕووداو</button>
        <button class="channel-btn" onclick="switchChannel('k24', 'https://www.youtube.com/embed/yZ7eZ8H_a1I', 'iframe', this)">کوردستان 24</button>
        <button class="channel-btn" onclick="switchChannel('kurdistantv', 'https://kurditv.com/embed/72/', 'iframe', this)">کوردستان تیڤی</button>
        <button class="channel-btn" onclick="switchChannel('channel8', 'https://kurditv.com/embed/1253/', 'iframe', this)">چەناڵ 8</button>
        <button class="channel-btn" onclick="switchChannel('trtkurdi', 'https://kurditv.com/embed/119/', 'iframe', this)">TRT Kurdi</button>
    </div>

    <main>
        <div id="ava" class="video-container active">
            <div class="responsive-iframe" id="wrap-ava">
                <iframe src="https://kurditv.com/embed/1245/" allowfullscreen="true" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
        </div>

        <div id="rudaw" class="video-container">
            <div class="responsive-iframe" id="wrap-rudaw"></div>
        </div>

        <div id="k24" class="video-container">
            <div class="responsive-iframe" id="wrap-k24"></div>
        </div>

        <div id="kurdistantv" class="video-container">
            <div class="responsive-iframe" id="wrap-kurdistantv"></div>
        </div>

        <div id="channel8" class="video-container">
            <div class="responsive-iframe" id="wrap-channel8"></div>
        </div>

        <div id="trtkurdi" class="video-container">
            <div class="responsive-iframe" id="wrap-trtkurdi"></div>
        </div>
    </main>

    <footer>
        <p>&copy; ٢٠٢٦ هەموو مافێک پارێزراوە - دیزاینی مۆدێرن</p>
    </footer>

    <script>
        let currentHls = null;

        function switchChannel(channelId, videoUrl, type, buttonElement) {
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            document.querySelectorAll('.responsive-iframe').forEach(wrap => {
                wrap.innerHTML = '';
            });

            document.querySelectorAll('.video-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));

            let container = document.getElementById(channelId);
            container.classList.add('active');
            buttonElement.classList.add('active');

            let wrap = document.getElementById('wrap-' + channelId);

            if (type === 'hls') {
                let video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.playsInline = true;
                wrap.appendChild(video);

                if (Hls.isSupported()) {
                    let hls = new Hls();
                    currentHls = hls;
                    hls.loadSource(videoUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(() => {});
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoUrl;
                    video.addEventListener('loadedmetadata', function() {
                        video.play().catch(() => {});
                    });
                }
            } else {
                wrap.innerHTML = `<iframe src="${videoUrl}" allowfullscreen="true" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
            }
        }
    </script>

</body>
</html>
