<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەخشی ڕاستەوخۆی کەناڵەکانی تەلەڤیزیۆن</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #1e293b;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 24px;
            color: #38bdf8;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: #94a3b8;
        }

        .channel-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background-color: #111827;
        }

        .channel-btn {
            background-color: #334155;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .channel-btn:hover {
            background-color: #475569;
        }

        .channel-btn.active {
            background-color: #0284c7;
            box-shadow: 0 0 15px rgba(2, 132, 199, 0.4);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: none;
        }

        .video-container.active {
            display: block;
        }

        .responsive-iframe {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* ڕێژەی ١٦:٩ */
            height: 0;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            background-color: #1e293b;
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #64748b;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>

    <header>
        <h1>پەخشی ڕاستەوخۆی کەناڵەکانی تەلەڤیزیۆن</h1>
        <p>Live TV Streaming</p>
    </header>

    <div class="channel-selector">
        <button class="channel-btn active" onclick="switchChannel('ava', this)">کەناڵی ئاڤا</button>
        <button class="channel-btn" onclick="switchChannel('rudaw', this)">کەناڵی ڕووداو</button>
    </div>

    <main>
        <!-- پەخشی کەناڵی ئاڤا -->
        <div id="ava" class="video-container active">
            <div class="responsive-iframe">
                <iframe src="https://kurditv.com/embed/1245/?autoplay=1" allowfullscreen="true" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
        </div>

        <!-- پەخشی کەناڵی ڕووداو (بە لێنکی فەرمی یوتیوب یان ستریمی ڕاستەوخۆ) -->
        <div id="rudaw" class="video-container">
            <div class="responsive-iframe">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC58wZgY54Z_98Kk4-z4Fw_A&autoplay=1" allowfullscreen="true" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; ٢٠٢٦ هەموو مافێک پارێزراوە بۆ وێبسایتەکەت</p>
    </footer>

    <script>
        function switchChannel(channelId, buttonElement) {
            document.querySelectorAll('.video-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(channelId).classList.add('active');
            buttonElement.classList.add('active');
        }
    </script>

</body>
</html>
