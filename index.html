<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Live TV - پەخشی ڕاستەوخۆی کەناڵە کوردییەکان</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: 1.7rem;
            color: #38bdf8;
        }

        .header p {
            margin: 0;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .player-section {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 4px;
        }

        .mode-btn {
            flex: 1;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px;
            border-radius: 12px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            background: #374151;
            border-color: #38bdf8;
        }

        .mode-btn.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            transition: padding-top 0.3s ease;
        }

        .video-wrapper.portrait {
            padding-top: 177.77%;
        }

        .video-wrapper video,
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
        }

        .current-channel-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .live-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        .channels-section {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 520px;
        }

        .search-box {
            width: 100%;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 14px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box:focus {
            border-color: #38bdf8;
        }

        .channels-list-scroll {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: 400px;
        }

        .channel-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 10px 14px;
            color: #fff;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .channel-btn:hover {
            background: #374151;
            border-color: rgba(56, 189, 248, 0.3);
        }

        .channel-btn.active {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
        }

        .channel-btn.active .dot {
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>پەخشی ڕاستەوخۆی کەناڵە کوردییەکان</h1>
        <p>سەیری کەناڵەکان بکە بە بێ پچڕان لەناو خودی سایتەکەدا</p>
    </header>

    <div class="main-container">
        <!-- Video Player Section -->
        <div class="player-section">
            <div class="mode-buttons">
                <button class="mode-btn active" id="landscapeBtn" onclick="setPlayerMode('landscape')">شێوازی پانی (Landscape)</button>
                <button class="mode-btn" id="portraitBtn" onclick="setPlayerMode('portrait')">شێوازی درێژی (Portrait)</button>
            </div>

            <div class="video-wrapper" id="videoWrapper">
                <div id="playerContainer" style="width:100%; height:100%; position:absolute; top:0; left:0;">
                    <video id="tvPlayer" controls autoplay playsinline style="width:100%; height:100%;"></video>
                </div>
            </div>
            <div class="current-channel-title">
                <span id="channelNameText">کەناڵێک هەڵبژێرە</span>
                <span class="live-badge">LIVE</span>
            </div>
        </div>

        <!-- Channels List Section -->
        <div class="channels-section">
            <input type="text" id="searchInput" class="search-box" placeholder="گەڕان بەدوای کەناڵدا..." onkeyup="filterChannels()">
            
            <div class="channels-list-scroll" id="channelsList">
                
                <!-- کەناڵی ڕووداو -->
                <div class="channel-btn active" data-name="ڕووداو rudaw" onclick="playChannel('ڕووداو - Rudaw', 'https://live.rudaw.net/hls/rudaw-tv/master.m3u8', 'hls', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>ڕووداو - Rudaw</span>
                    </div>
                </div>

                <!-- کەناڵی کوردستان ٢٤ -->
                <div class="channel-btn" data-name="کوردستان ٢٤ kurdistan 24 k24" onclick="playChannel('کوردستان ٢٤ - K24', 'https://www.youtube.com/embed/yZ7eZ8H_a1I?autoplay=1', 'youtube', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>کوردستان ٢٤ - K24</span>
                    </div>
                </div>

                <!-- کەناڵی ئاڤا نیوز -->
                <div class="channel-btn" data-name="ئاڤا نیوز ava news" onclick="playChannel('ئاڤا نیوز - AVA News', 'https://www.youtube.com/embed/live_stream?channel=UC...&autoplay=1', 'youtube', this)">
                    <div class="channel-info">
                        <div class="dot"></div>
                        <span>ئاڤا نیوز - AVA News</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let hls = null;

        function playChannel(name, url, type, element) {
            document.getElementById('channelNameText').innerText = name;
            
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const container = document.getElementById('playerContainer');

            if (type === 'hls') {
                if (hls) { hls.destroy(); }
                container.innerHTML = '<video id="tvPlayer" controls autoplay playsinline style="width:100%; height:100%; object-fit:contain;"></video>';
                const video = document.getElementById('tvPlayer');

                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                }
            } else if (type === 'youtube') {
                if (hls) { hls.destroy(); }
                container.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            }
        }

        function setPlayerMode(mode) {
            const wrapper = document.getElementById('videoWrapper');
            const landscapeBtn = document.getElementById('landscapeBtn');
            const portraitBtn = document.getElementById('portraitBtn');

            if (mode === 'portrait') {
                wrapper.classList.add('portrait');
                portraitBtn.classList.add('active');
                landscapeBtn.classList.remove('active');
            } else {
                wrapper.classList.remove('portrait');
                landscapeBtn.classList.add('active');
                portraitBtn.classList.remove('active');
            }
        }

        window.onload = function() {
            let firstChannel = document.querySelector('.channel-btn');
            if(firstChannel) {
                firstChannel.click();
            }
        };

        function filterChannels() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let channels = document.querySelectorAll('.channel-btn');

            channels.forEach(channel => {
                let name = channel.getAttribute('data-name').toLowerCase();
                if (name.includes(input)) {
                    channel.style.display = 'flex';
                } else {
                    channel.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
